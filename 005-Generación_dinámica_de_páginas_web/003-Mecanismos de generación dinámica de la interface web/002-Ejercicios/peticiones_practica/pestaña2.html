<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Pestañas Simples sin Map</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f5f5f5;
        padding: 20px;
      }

      /* Botones de pestañas */
      .tabs {
        margin-bottom: 20px;
      }

      .tab-buttons button {
        padding: 10px;
        margin-right: 5px;
        cursor: pointer;
        background: #ddd;
        border: 1px solid #777;
        border-radius: 5px;
      }

      .tab-buttons button:hover {
        background: #ccc;
      }

      /* Secciones */
      .tab-section {
        display: none;
        background: white;
        padding: 20px;
        border-radius: 5px;
        border: 1px solid #333;
      }
    </style>
  </head>
  <body>
    <h1>Pestañas con JavaScript</h1>

    <div id="tabsContainer"></div>

    <section id="post-simple" class="tab-section">
      <h2>POST con párametros simples</h2>
      <form action="" id="form_post">
        <label for="nombre">Ingresa tu nombre</label>
        <input type="text" id="nombre" name="nombre" />
        <label for="edad">Ingresa tu edad</label>
        <input type="number" id="edad" name="edad" />
        <button type="submit">Enviar</button>
      </form>
      <p id="respuesta01"></p>
    </section>

    <section id="get" class="tab-section">
      <h2>GET</h2>
      <form action="" id="form_get">
        <label for="nombre">Ingresa tu nombre</label>
        <input type="text" id="nombre2" name="nombre2" />
        <label for="edad">Ingresa tu edad</label>
        <input type="number" id="edad2" name="edad2" />
        <button type="submit">Enviar</button>
      </form>
      <p id="respuesta2"></p>
    </section>

    <section id="post-json" class="tab-section">
      <h2>POST con JSON</h2>
      <form action="" id="form_post_json">
        <label for="nombre">Ingresa tu nombre</label>
        <input type="text" id="nombre3" name="nombre3" />
        <label for="edad">Ingresa tu edad</label>
        <input type="number" id="edad3" name="edad3" />
        <button type="submit">Enviar</button>
      </form>
      <p id="respuesta3"></p>
    </section>
    <section id="post-json-respuesta-json" class="tab-section">
      <h2>POST con JSON Y RESPUESTA EN JSON</h2>
      <form action="" id="form_json_json">
        <label for="nombre">Ingresa tu nombre</label>
        <input type="text" id="nombre4" name="nombre4" />
        <label for="edad">Ingresa tu edad</label>
        <input type="number" id="edad4" name="edad4" />
        <button type="submit">Enviar</button>
      </form>
      <p id="respuesta4"></p>
    </section>
    <section id="cookie" class="tab-section">
      <h2>COOKIE</h2>
      <form action="" id="form_cookie">
        <label for="nombre5">Ingresa tu nombre</label>
        <input type="text" id="nombre5" name="nombre5" />
        <label for="edad5">Ingresa tu edad</label>
        <input type="number" id="edad5" name="edad5" />
        <button type="submit">Enviar</button>
      </form>
      <p id="respuesta5"></p>
    </section>
    <section id="cookie_respuesta_cookie" class="tab-section">
      <h2>COOKIE RESPUESTA FORMATO COOKIE</h2>
      <form action="" id="form_cookie_cookie">
        <label for="nombre">Ingresa tu nombre</label>
        <input type="text" id="nombre6" name="nombre6" />
        <label for="edad">Ingresa tu edad</label>
        <input type="number" id="edad6" name="edad6" />
        <button type="submit">Enviar</button>
      </form>
      <p id="respuesta6"></p>
    </section>

    <script>
      class Tabs {
        constructor(tabNames, sectionIds) {
          this.tabNames = tabNames;
          this.sectionIds = sectionIds;

          this.container = document.createElement("div");
          this.container.className = "tabs";

          this.btnArea = document.createElement("div");
          this.btnArea.className = "tab-buttons";

          this.container.appendChild(this.btnArea);

          this.createButtons();
          this.showTab(0); // Mostrar primera pestaña
        }

        createButtons() {
          this.tabNames.forEach((name, index) => {
            const btn = document.createElement("button");
            btn.textContent = name;
            btn.onclick = () => this.showTab(index);
            this.btnArea.appendChild(btn);
          });
        }

        showTab(index) {
          // Ocultar todas las secciones
          document
            .querySelectorAll(".tab-section")
            .forEach((sec) => (sec.style.display = "none"));

          // Mostrar la sección correspondiente
          const sectionId = this.sectionIds[index];
          document.getElementById(sectionId).style.display = "block";
        }

        render(container) {
          container.appendChild(this.container);
        }
      }

      const myTabs = new Tabs(
        [
          "POST-SIMPLE",
          "GET",
          "POST - JSON",
          "POST-JSON RESPONSE JSON",
          "COOKIE",
          "COOKIE RESPONSE COOKIE",
        ],
        [
          "post-simple",
          "get",
          "post-json",
          "post-json-respuesta-json",
          "cookie",
          "cookie_respuesta_cookie",
        ], // IDs de las secciones
      );

      myTabs.render(document.getElementById("tabsContainer"));

      /**
       * 1. Enviamos los datos por método POST
       */
      document
        .getElementById("form_post")
        .addEventListener("submit", async (e) => {
          e.preventDefault();

          const datos = new FormData(e.target);
          datos.append("accion", "post_form");

          const respuesta = await fetch("procesar1.php", {
            method: "POST",
            body: new URLSearchParams(datos),
          });

          document.getElementById("respuesta01").innerText =
            await respuesta.text();
        });

      /*
       *2) Enviar número por GET
       */
      document
        .getElementById("form_get")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          const datos = new FormData(e.target);
          const nombre2 = datos.get("nombre2");
          const edad2 = datos.get("edad2");

          // Se envía en la URL
          const respuesta2 = await fetch(
            "procesar1.php?accion=get_form&nombre2=" +
              encodeURIComponent(nombre2) +
              "&edad2=" +
              encodeURIComponent(edad2),
          );

          document.getElementById("respuesta2").innerText =
            await respuesta2.text();
        });

      // --------------------------------------------------------------------
      // 3) Enviar JSON por POST
      // --------------------------------------------------------------------
      document
        .getElementById("form_post_json")
        .addEventListener("submit", async (e) => {
          e.preventDefault();

          const datos = new FormData(e.target);

          const respuesta = await fetch("procesar1.php", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              accion: "post_json",
              persona: {
                nombre: datos.get("nombre3"),
                edad: datos.get("edad3"),
              },
            }),
          });

          document.getElementById("respuesta3").innerText =
            await respuesta.text();
        });

      // --------------------------------------------------------------------
      // 4) Enviar JSON por POST y recibir JSON desde PHP, pero mostrando solo el mensaje
      // --------------------------------------------------------------------
      document
        .getElementById("form_json_json")
        .addEventListener("submit", async (e) => {
          e.preventDefault();

          const datos = new FormData(e.target);

          const respuesta = await fetch("procesar1.php", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Accept: "application/json",
            },
            body: JSON.stringify({
              accion: "json_datos_json",
              persona: {
                nombre: datos.get("nombre4"),
                edad: datos.get("edad4"),
              },
            }),
          });

          // Recibir JSON del servidor
          const json = await respuesta.json();

          // Mostrar solo lo que nos interesa
          const nombre = json.nombre;
          const edad = json.edad;

          document.getElementById("respuesta4").innerText =
            nombre + "\n tu edad es" + edad;
        });

      // --------------------------------------------------------------------
      // Funciones de cookies
      // ------------------------------------------------------------------

      /*Función para crear una cookie*/
      function setCookie(nombre, valor, dias) {
        const fecha = new Date();
        fecha.setTime(fecha.getTime() + dias * 24 * 60 * 60 * 1000); // duración en días
        const expiracion = "expires=" + fecha.toUTCString();
        document.cookie =
          nombre +
          "=" +
          encodeURIComponent(valor) +
          ";" +
          expiracion +
          ";path=/";
      }

      /*función para leer una cookie*/

      // Función para leer una cookie
      function getCookie(nombre) {
        const nombreEQ = nombre + "=";
        const cookies = document.cookie.split(";");
        for (let i = 0; i < cookies.length; i++) {
          let c = cookies[i].trim();
          if (c.indexOf(nombreEQ) === 0) {
            return decodeURIComponent(c.substring(nombreEQ.length));
          }
        }
        return null;
      }

      // Función para borrar una cookie
      function deleteCookie(nombre) {
        document.cookie =
          nombre + "=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";
      }

      // --------------------------------------------------------------------
      // 5) Cookie tipo 1
      // --------------------------------------------------------------------

      // Servidor lee las cookies y responde texto

      document
        .getElementById("form_cookie")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          const datos = e.target;
          const nombre = datos.nombre5.value;
          const edad = datos.edad5.value;

          //validadmos que no esten vacios los datos
          if (!nombre || !edad || edad === "" || nombre === "") {
            document.getElementById("respuesta5").innerText = "Faltan datos.";
            return;
          }
          //creamos las cookies
          setCookie("nombre", nombre, 1);
          setCookie("edad", edad, 1);

          //Llamada al servidor
          const respuesta = await fetch("cookies1.php?accion=leer_cookie", {
            method: "GET",
            credentials: "same-origin",
          });

          const texto = await respuesta.text();
          document.getElementById("respuesta5").innerText = texto;
        });

      // --------------------------------------------------
      // 6) Cokkie respone cookie  servidor crea una cookie y el cliente la usa para mostrar el mensaje
      // --------------------------------------------------

      document
        .getElementById("form_cookie_cookie")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          const datos = e.target;
          const nombre = datos.nombre6.value;
          const edad = datos.edad6.value;
          const resultado = document.getElementById("respuesta6");

          if (!nombre || !edad) {
            resultado.innerText = "No se introdujo nombre.";
            return;
          }

          // Creamos cookie en el cliente
          setCookie("nombre", nombre, 1);
          setCookie("edad", edad, 1);

          // Pedimos al servidor que nos "devuelva" la info en forma de cookie (Set-Cookie)

          const respuesta = await fetch(
            "cookies1.php?accion=servidor_set_cookie",
            {
              method: "GET",
              credentials: "same-origin",
            },
          );

          // Leemos texto (opcional, solo informativo)
          await respuesta.text();

          // Ahora el navegador ya debería haber guardado la cookie enviada por PHP
          const valorCookieServidor = getCookie("mensaje_servidor");

          if (valorCookieServidor) {
            resultado.innerText =
              "Mensaje construido usando la cookie del servidor:\n" +
              valorCookieServidor;
          } else {
            resultado.innerText =
              "No se encontró la cookie 'mensaje_servidor'.";
          }
        });
    </script>
  </body>
</html>
