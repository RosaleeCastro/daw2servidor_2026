<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Calculadora SOAP didactica</title>
  </head>
  <body>
    <!--
      Cliente web para probar el servicio SOAP calculadora-soap.php.

      Este HTML genera manualmente una peticion SOAP en XML y la envia por POST.
      Despues recibe XML, lo interpreta y muestra el resultado.
    -->

    <h1>Calculadora SOAP didactica</h1>

    <p>
      Este ejemplo envia una peticion SOAP en XML a un servidor PHP usando HTTP
      POST.
    </p>

    <label for="operacion">Operacion:</label><br />
    <select id="operacion">
      <option value="sumar">sumar</option>
      <option value="restar">restar</option>
      <option value="multiplicar">multiplicar</option>
      <option value="dividir">dividir</option>
    </select>
    <br /><br />

    <label for="a">Primer numero:</label><br />
    <input type="number" id="a" value="8" />
    <br /><br />

    <label for="b">Segundo numero:</label><br />
    <input type="number" id="b" value="3" />
    <br /><br />

    <button id="btnEnviar">Enviar peticion SOAP</button>
    <br /><br />

    <p>
      <a href="calculadora.wsdl" target="_blank">Ver WSDL del servicio</a>
    </p>

    <h2>Peticion SOAP enviada</h2>
    <pre id="peticion"></pre>

    <h2>Respuesta SOAP recibida</h2>
    <pre id="respuesta"></pre>

    <h2>Resultado interpretado</h2>
    <p id="resultado"></p>

    <script>
      // El boton construye y envia la peticion SOAP.
      document
        .getElementById("btnEnviar")
        .addEventListener("click", async () => {
          const operacion = document.getElementById("operacion").value;
          const a = document.getElementById("a").value;
          const b = document.getElementById("b").value;

          /*
           * Mensaje SOAP que se enviara al servidor.
           *
           * Toda peticion SOAP tiene:
           * - soap:Envelope
           * - soap:Body
           * - una operacion dentro del Body
           *
           * La operacion cambia dinamicamente segun el select:
           * <sumar>, <restar>, <multiplicar> o <dividir>.
           */
          const xmlSOAP = `<?xml version="1.0" encoding="UTF-8"?>
                <soap:Envelope xmlns:soap="http://schemas.xmlsoap.org/soap/envelope/">
                <soap:Body>
                    <${operacion}>
                    <a>${a}</a>
                    <b>${b}</b>
                    </${operacion}>
                </soap:Body>
                </soap:Envelope>`;

          document.getElementById("peticion").innerText = xmlSOAP;
          document.getElementById("respuesta").innerText = "Enviando...";
          document.getElementById("resultado").innerText = "";

          try {
            /*
             * Enviamos XML, no JSON.
             * Por eso Content-Type es text/xml.
             */
            const respuesta = await fetch("calculadora-soap.php", {
              method: "POST",
              headers: {
                "Content-Type": "text/xml; charset=utf-8",
                Accept: "text/xml",
              },
              body: xmlSOAP,
            });

            // Leemos la respuesta como texto porque es XML.
            const textoRespuesta = await respuesta.text();
            document.getElementById("respuesta").innerText = textoRespuesta;

            // Convertimos el texto XML en un documento navegable.
            const parser = new DOMParser();
            const xml = parser.parseFromString(textoRespuesta, "text/xml");

            // Si todo ha ido bien, habra una etiqueta <resultado>.
            const nodoResultado = xml.getElementsByTagName("resultado")[0];

            /*
             * La division devuelve tambien <resto>.
             * En suma, resta y multiplicacion este nodo no existira.
             */
            const nodoResto = xml.getElementsByTagName("resto")[0];

            // Si algo ha fallado, SOAP devuelve <faultstring>.
            const nodoFault = xml.getElementsByTagName("faultstring")[0];

            if (nodoResultado && nodoResto) {
              document.getElementById("resultado").innerText =
                "Resultado de la division: " +
                nodoResultado.textContent +
                "\nResto: " +
                nodoResto.textContent;
            } else if (nodoResultado) {
              document.getElementById("resultado").innerText =
                "Resultado devuelto por el servicio: " +
                nodoResultado.textContent;
            } else if (nodoFault) {
              document.getElementById("resultado").innerText =
                "Error SOAP: " + nodoFault.textContent;
            } else {
              document.getElementById("resultado").innerText =
                "No se pudo interpretar la respuesta.";
            }
          } catch (error) {
            document.getElementById("respuesta").innerText = "Error de red";
            document.getElementById("resultado").innerText = String(error);
          }
        });
    </script>
  </body>
</html>
